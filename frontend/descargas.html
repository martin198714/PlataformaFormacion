<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Descargar Archivos - Ejidosoft Formación</title>

    <meta name="description"
        content="Descarga archivos y recursos formativos de Ejidosoft Formación. Accede a documentos, guías y materiales educativos de forma rápida y segura.">

    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://ejidosoft.es/descargas">

    <meta property="og:type" content="website">

    <!-- 🚀 PERFORMANCE: Preconnect CDN -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

    <link rel="icon" type="image/webp" href="img/logo.png" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/admin_archivos.css">
    <link rel="stylesheet" href="css/admin_usuarios.css">
    <link rel="stylesheet" href="css/descargas.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg" role="navigation" aria-label="Menú principal del sitio">
        <div class="container">

            <a class="navbar-brand" href="admin.html" aria-label="Ir al panel de administración de Ejidosoft Formación">
            </a>

            <div class="ms-auto">
                <a href="index.html" class="btn btn-warning" aria-label="Volver a la página anterior">
                    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                    Volver
                </a>
            </div>

        </div>
    </nav>

    <header class="encabezado-login" role="banner">
        <div class="container">
            <div class="row align-items-center text-center text-md-start">

                <div class="col-md-4">
                    <img src="img/logo.png" width="180" height="60" class="img-fluid logo-login"
                        alt="Logo de Ejidosoft Formación" loading="lazy" />
                </div>

                <div class="col-md-8">
                    <h1 class="fw-bold titulo-formulario">
                        <i class="fa-solid fa-download" aria-hidden="true"></i>
                        Descargar Archivos
                    </h1>
                </div>

            </div>
        </div>
    </header>

    <main class="container my-5" role="main">

        <div id="archivosContainer" aria-live="polite"></div>

    </main>

    <footer class="text-center py-3 text-white" role="contentinfo">

        <div class="container">
            <div class="row">

                <div class="col-6 col-md-2"></div>
                <div class="col-6 col-md-2"></div>

                <div class="col-6 col-md-2">
                    © 2026 Ejidosoft Formación
                </div>

                <div class="col-6 col-md-2"></div>

                <div class="col-6 col-md-2">
                    <img src="img/logo-pie.png" alt="Logo Ejidosoft Formación" loading="lazy">
                </div>

                <div class="col-md-2 footer-contacto ms-auto text-md-end">
                    C/Jaén nº18-20 04700<br>
                    El Ejido (Almería)<br>
                    Telf.: 950 48 73 99<br>
                    info@ejidosoft.es
                </div>

            </div>
        </div>
    </footer>

    <script>
        const API = "http://localhost:3000/api/archivos";
        const token = localStorage.getItem("token");

        async function cargarArchivos() {

            try {

                const response = await fetch(`${API}/publicos`, {
                    cache: "no-store",
                    headers: {
                        Authorization: "Bearer " + token
                    }
                });

                if (!response.ok) throw new Error('Error al obtener archivos');

                const archivos = await response.json();

                const container = document.getElementById('archivosContainer');
                container.innerHTML = '';

                if (!archivos.length) {
                    container.innerHTML = '<p class="text-center text-muted">No hay archivos disponibles</p>';
                    return;
                }

                // ==========================
                // ORDEN FIJO (igual que admin_usuarios)
                // ==========================
                const ORDEN_TITULOS = {
                    "Planning 4.0": 1,
                    "Transporta 4.0": 2,
                    "Base 4.0": 3,
                    "Gestion Horto 4.0": 4,
                    "Contasoft 4.0": 5,
                    "SII 4.0": 6,
                    "Fiscal 4.0": 7,
                    "Verifactu 4.0": 8
                };

                // ==========================
                // AGRUPAR POR TITULO
                // ==========================
                const porTitulo = {};

                for (const a of archivos) {
                    const titulo = a.TITULO || "Sin título";
                    (porTitulo[titulo] ??= []).push(a);
                }

                // ==========================
                // ORDENAR TITULOS
                // ==========================
                const titulosOrdenados = Object.keys(porTitulo).sort((a, b) => {
                    return (ORDEN_TITULOS[a] ?? 999) - (ORDEN_TITULOS[b] ?? 999);
                });

                // ==========================
                // RENDER
                // ==========================
                let index = 0;

                for (const titulo of titulosOrdenados) {

                    const id = "col" + index;

                    const h4 = document.createElement('h4');
                    h4.className = "mt-4 titulo-colapsable";
                    h4.textContent = titulo;

                    h4.setAttribute("data-bs-toggle", "collapse");
                    h4.setAttribute("data-bs-target", "#" + id);

                    // ✔ mejora UX
                    h4.style.cursor = "pointer";

                    container.appendChild(h4);

                    const div = document.createElement('div');

                    // ✅ CAMBIO IMPORTANTE: TODOS ABIERTOS
                    div.className = "collapse show";

                    div.id = id;

                    const table = document.createElement('table');
                    table.className = "table table-bordered table-striped table-fixed mt-2";

                    table.innerHTML = `
                    <thead class="table-primary">
                        <tr>
                            <th class="text-center">Tipo</th>
                            <th>Descripción</th>
                            <th class="text-center">Descargar</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;

                    const tbody = table.querySelector('tbody');

                    for (const file of porTitulo[titulo]) {

                        const ext = (file.FICHERO_NOMBRE || '').split('.').pop().toLowerCase();

                        let icon = '<i class="fa fa-file text-primary"></i>';

                        if (ext === 'pdf')
                            icon = '<img src="img/pdf.png" class="card-icon">';
                        else if (ext.includes('doc'))
                            icon = '<img src="img/word.png" class="card-icon">';
                        else if (ext.includes('xls'))
                            icon = '<img src="img/excel.png" class="card-icon">';
                        else if (ext === 'zip' || ext === 'rar')
                            icon = '<img src="img/zip.png" class="card-icon">';

                        const tr = document.createElement('tr');

                        tr.innerHTML = `
                        <td class="text-center">${icon}</td>
                        <td>${file.DESCRIPCION || ''}</td>
                    `;

                        const td = document.createElement('td');
                        td.className = "text-center";

                        const btn = document.createElement('button');
                        btn.className = 'btn btn-warning btn-sm';
                        btn.innerHTML = '<i class="fa fa-download"></i>';

                        btn.onclick = () => descargarArchivo(file.ARCHIVO_ID);

                        td.appendChild(btn);
                        tr.appendChild(td);
                        tbody.appendChild(tr);
                    }

                    div.appendChild(table);
                    container.appendChild(div);

                    index++;
                }

            } catch (error) {
                console.error(error);
                document.getElementById('archivosContainer').innerHTML =
                    '<p class="text-danger text-center">Error cargando archivos</p>';
            }
        }

        // ==========================
        // DESCARGA SEGURA
        // ==========================
        function descargarArchivo(id) {

            if (!token) {
                alert("No tienes sesión iniciada");
                return;
            }

            fetch(`${API}/descargar/${id}`, {
                headers: {
                    Authorization: "Bearer " + token
                }
            })
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = "";
                    link.click();
                })
                .catch(() => {
                    alert("No tienes acceso a este archivo");
                });
        }

        document.addEventListener('DOMContentLoaded', cargarArchivos);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
