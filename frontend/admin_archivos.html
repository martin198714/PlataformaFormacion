<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Administrar Archivos - Ejidosoft Formación</title>

    <meta name="description"
        content="Gestión de archivos del panel de administración de Ejidosoft Formación. Control de versiones, edición y eliminación de documentos.">

    <link rel="icon" type="image/webp" href="img/logo.png" />

    <!-- CSS optimizado (no bloqueante) -->
    <link rel="preload" href="css/styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="css/admin_archivos.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="css/login.css" as="style" onload="this.onload=null;this.rel='stylesheet'">

    <noscript>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/admin_archivos.css">
        <link rel="stylesheet" href="css/login.css">
    </noscript>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand" href="admin.html" aria-label="Ir al panel de administración">
                <span class="visually-hidden">Ir al panel de administración</span>
            </a>

            <div class="ms-auto">
                <a href="admin.html" class="btn btn-warning">
                    <i class="fa-solid fa-arrow-left"></i>
                    Volver
                </a>
            </div>

        </div>
    </nav>

    <header class="encabezado-login" role="banner">
        <div class="container">
            <div class="row align-items-center text-center text-md-start">

                <div class="col-md-4">
                    <img src="img/logo.png" width="180" height="60" loading="eager" decoding="async"
                        alt="Logo Ejidosoft Formación" class="img-fluid logo-login" />
                </div>

                <div class="col-md-8">
                    <h1 class="fw-bold titulo-formulario"><i class="fa-solid fa-file me-2"></i> Gestión de Archivos</h1>
                </div>

            </div>
        </div>
    </header>

    <main class="container my-5" role="main">

        <!-- FIX CLS -->
        <div id="archivosContainer" aria-live="polite" aria-busy="true" style="min-height: 600px;"></div>

    </main>

    <!-- MODAL -->
    <div class="modal fade" id="editArchivoModal" tabindex="-1" aria-labelledby="editArchivoModalLabel"
        aria-hidden="true" role="dialog" aria-modal="true">

        <div class="modal-dialog">
            <div class="modal-content">

                <form id="editArchivoForm">

                    <div class="modal-header">
                        <h2 class="modal-title h5" id="editArchivoModalLabel">Editar Archivo</h2>

                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" id="editArchivoId">

                        <label class="form-label" for="editArchivoTitulo">Título</label>
                        <input type="text" class="form-control" id="editArchivoTitulo" required>

                        <label class="form-label mt-2" for="editArchivoDescripcion">Descripción</label>
                        <textarea class="form-control" id="editArchivoDescripcion" rows="3" required></textarea>

                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="editArchivoPublico">
                            <label class="form-check-label" for="editArchivoPublico">Archivo público</label>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-primary" type="submit">Guardar</button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 text-white">
        <div class="container">
            <div class="row">

                <div class="col-6 col-md-2">

                </div>

                <div class="col-6 col-md-2">

                </div>

                <div class="col-6 col-md-2">
                    © 2026 Ejidosoft Formación
                </div>

                <div class="col-6 col-md-2">

                </div>

                <div class="col-6 col-md-2">
                    <img src="img/logo-pie.png" alt="logo-pie">
                </div>

                <div class="col-md-2 footer-contacto ms-auto text-md-end">
                    C/Jaén nº18-20 04700
                    <br>
                    El Ejido (Almería)
                    <br>
                    Telf.: 950 48 73 99
                    <br>
                    info@ejidosoft.es
                </div>

            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const token = localStorage.getItem("token");
        const API = "http://localhost:3000/api/archivos";

        if (!token) {
            location.href = "login.html";
        }

        const ORDEN_MODULOS = [
            "Planning 4.0",
            "Transporta 4.0",
            "Base 4.0",
            "Gestion Horto 4.0",
            "Contasoft 4.0",
            "SII 4.0",
            "Fiscal 4.0",
            "Verifactu 4.0"
        ];

        let archivoEditandoId = null;
        let editModal = null;

        /* ===============================
           INICIO SEGURO
        ================================= */
        document.addEventListener("DOMContentLoaded", () => {

            // MODAL BOOTSTRAP SEGURO
            const modalEl = document.getElementById("editArchivoModal");
            if (window.bootstrap && modalEl) {
                editModal = new bootstrap.Modal(modalEl);
            }

            // ===========================
            // 🔥 BOTÓN VOLVER ARREGLADO
            // ===========================
            const btnVolver = document.getElementById("btnVolver");

            if (btnVolver) {
                btnVolver.addEventListener("click", (e) => {
                    e.preventDefault();
                    window.location.href = "admin.html";
                });
            }

            cargarArchivos();
        });

        /* ===============================
           FETCH SEGURO
        ================================= */
        async function safeFetch(url, options = {}) {
            try {
                options.cache = "no-store";

                const res = await fetch(url, options);
                const text = await res.text();

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = { error: text };
                }

                if (!res.ok) {
                    throw new Error(data.error || "Error API");
                }

                return data;

            } catch (err) {
                console.error("FETCH ERROR:", err);
                return [];
            }
        }

        /* ===============================
           VERSION
        ================================= */
        function calcularVersion(a) {
            if (a.VERSION) return "v" + a.VERSION;

            if (a.CREATED_AT) {
                const d = new Date(a.CREATED_AT);
                return `v${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
            }

            return "v1";
        }

        /* ===============================
           FRAME HELP
        ================================= */
        function nextFrame() {
            return new Promise(requestAnimationFrame);
        }

        /* ===============================
           CARGAR ARCHIVOS
        ================================= */
        async function cargarArchivos() {
            const container = document.getElementById("archivosContainer");

            try {
                const archivos = await safeFetch(`${API}/admin`, {
                    headers: { Authorization: "Bearer " + token }
                });

                container.innerHTML = "";

                const grupos = {};
                archivos.forEach(a => {
                    const t = a.TITULO || "Sin título";
                    if (!grupos[t]) grupos[t] = [];
                    grupos[t].push(a);
                });

                const fragment = document.createDocumentFragment();
                const titulosOrdenados = ORDEN_MODULOS.filter(t => grupos[t]);

                for (const [index, titulo] of titulosOrdenados.entries()) {

                    const h4 = document.createElement("h4");
                    h4.className = "mt-4 titulo-colapsable";
                    h4.textContent = titulo;

                    h4.setAttribute("role", "button");
                    h4.setAttribute("tabindex", "0");
                    h4.setAttribute("data-bs-toggle", "collapse");
                    h4.setAttribute("data-bs-target", `#collapseTabla${index}`);

                    const collapse = document.createElement("div");
                    collapse.className = "collapse show";
                    collapse.id = `collapseTabla${index}`;

                    const table = document.createElement("table");
                    table.className = "table table-bordered table-striped mt-2 table-fixed";

                    table.innerHTML = `
                <thead class="table-primary">
                    <tr>
                        <th>Descripción</th>
                        <th>Versión</th>
                        <th>Tamaño</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

                    const tbody = table.querySelector("tbody");

                    grupos[titulo].forEach(a => {
                        const tr = document.createElement("tr");

                        tr.innerHTML = `
                    <td><strong>${a.DESCRIPCION || "-"}</strong></td>
                    <td class="text-center">${calcularVersion(a)}</td>
                    <td>${a.TAMANIO ? (a.TAMANIO / 1024 / 1024).toFixed(2) + " MB" : "-"}</td>
                    <td>${a.CREATED_AT || "-"}</td>
                    <td class="text-center">
                        <button class="btn btn-warning btn-sm"
                            onclick="abrirModal(${a.ARCHIVO_ID})">
                            <i class="fa-solid fa-pen"></i>
                        </button>

                        <button class="btn btn-warning btn-sm"
                            onclick="eliminarArchivo(${a.ARCHIVO_ID})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;

                        tbody.appendChild(tr);
                    });

                    const wrapper = document.createElement("div");
                    wrapper.className = "table-responsive";
                    wrapper.appendChild(table);

                    collapse.appendChild(wrapper);

                    fragment.appendChild(h4);
                    fragment.appendChild(collapse);

                    await nextFrame();
                }

                container.appendChild(fragment);

            } catch (e) {
                console.error("ERROR CARGANDO ARCHIVOS:", e);
            }
        }

        /* ===============================
           ABRIR MODAL
        ================================= */
        window.abrirModal = async function (id) {
            try {
                const archivos = await safeFetch(`${API}/admin`, {
                    headers: { Authorization: "Bearer " + token }
                });

                const archivo = archivos.find(a => a.ARCHIVO_ID == id);
                if (!archivo) return;

                archivoEditandoId = id;

                document.getElementById("editArchivoId").value = id;
                document.getElementById("editArchivoTitulo").value = archivo.TITULO;
                document.getElementById("editArchivoDescripcion").value = archivo.DESCRIPCION || "";
                document.getElementById("editArchivoPublico").checked = archivo.PUBLICO == 1;

                editModal?.show();

            } catch (err) {
                console.error(err);
            }
        };

        /* ===============================
           GUARDAR EDIT
        ================================= */
        document.getElementById("editArchivoForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            try {
                await safeFetch(`${API}/${archivoEditandoId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: "Bearer " + token
                    },
                    body: JSON.stringify({
                        titulo: document.getElementById("editArchivoTitulo").value,
                        descripcion: document.getElementById("editArchivoDescripcion").value,
                        publico: document.getElementById("editArchivoPublico").checked
                    })
                });

                editModal?.hide();
                cargarArchivos();

            } catch (err) {
                console.error(err);
            }
        });

        /* ===============================
           ELIMINAR
        ================================= */
        window.eliminarArchivo = async function (id) {
            if (!confirm("¿Seguro que quieres eliminarlo?")) return;

            try {
                await safeFetch(`${API}/${id}`, {
                    method: "DELETE",
                    headers: { Authorization: "Bearer " + token }
                });

                cargarArchivos();

            } catch (err) {
                console.error(err);
            }
        };
    </script>

</body>

</html>
