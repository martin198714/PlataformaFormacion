<body>

  <nav class="navbar navbar-expand-lg" role="navigation" aria-label="Menú principal">

      <a class="navbar-brand d-flex align-items-center text-white" href="index.html" aria-label="Inicio Ejidosoft"></a>

        <a href="admin.html" class="btn btn-warning">
          <i class="fa-solid fa-arrow-left"></i>
          Volver
        </a>
      </div>
    </div>
  </nav>

  <header class="encabezado-login" role="banner">
    <div class="container">
      <div class="row align-items-center text-center text-md-start">

        <div class="col-md-4 mb-4 mb-md-0 d-flex justify-content-center justify-content-md-start">
          <img src="img/logo.png" class="img-fluid logo-login" alt="Logo Ejidosoft Formación">

        <div class="col-md-8 d-flex align-items-center justify-content-center justify-content-md-start">
          <h1 class="fw-bold titulo-formulario">
            <i class="fa-solid fa-file-video me-2" aria-hidden="true"></i>
            Subir Capítulos
          </h1>
        </div>

      </div>
    </div>
  </header>

  <main class="main-upload" role="main">
    <section class="login-section">

      <div class="modal-content border-0 ui-panel shadow-lg mb-5" style="border-radius: 12px;">

        <div class="text-end p-3">
          <a href="admin.html" class="btn-close"></a>

        <div class="p-4">

          <form id="formCapitulos">

            <div class="mb-3">
              <label for="titulo" class="form-label">Título</label>
              <input id="titulo" type="text" class="form-control" name="titulo" maxlength="255" required>
            </div>

            <div class="mb-3">
              <label for="descripcion" class="form-label">Descripción</label>
              <input type="text" class="form-control" id="descripcion" name="descripcion" required>
            </div>

            <div class="mb-3">
              <label for="chapterFiles" class="form-label">Seleccionar vídeos</label>
              <input type="file" class="form-control" id="chapterFiles" accept=".mp4,.webm,.ogg,.mkv,.m4v,.mov,.avi"
                multiple required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
              <i class="fa-solid fa-upload me-1" aria-hidden="true"></i>
              Subir
            </button>

          </form>

          <!-- PROGRESO -->
          <div class="mt-4" aria-live="polite">
            <p id="currentFileName" class="fw-bold text-primary"></p>

            <div class="progress" id="progressBarContainer" style="display:none;" role="progressbar" aria-valuemin="0"
              aria-valuemax="100" aria-valuenow="0">

              <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                style="width:0%">
                0%
              </div>
            </div>
          </div>

          <!-- RESULTADOS -->
          <div id="uploadedFiles" class="mt-3" aria-live="polite"></div>

        </div>
      </div>

    </section>

  </main>

  <footer class="text-center py-3 text-white" role="contentinfo">
    <div class="container">
      <div class="row">

        <div class="col-6 col-md-2"></div>

        <div class="col-6 col-md-2">

        </div>

        <div class="col-6 col-md-2">
          <img src="img/logo-pie.png" alt="Logo pie Ejidosoft" />
        </div>

        <div class="col-md-2 footer-contacto ms-auto text-md-end">
          <address>
            C/Jaén nº18-20 04700<br>
            El Ejido (Almería)<br>
            Telf.: 950 48 73 99<br>

          </address>
        </div>

      </div>
    </div>
  </footer>
  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
  <!-- JS -->
  <script>

    const API_BASE =
      "http://localhost:3000/api/videos";

    const CHUNK_SIZE =
      2 * 1024 * 1024;

    const progressBarContainer =
      document.getElementById(
        "progressBarContainer"
      );

    const progressBar =
      document.getElementById(
        "progressBar"
      );

    const currentFileName =
      document.getElementById(
        "currentFileName"
      );

    const uploadedFiles =
      document.getElementById(
        "uploadedFiles"
      );

    function updateProgress(p) {

      progressBarContainer.style.display =
        "block";

      progressBar.style.width =
        p + "%";

      progressBar.textContent =
        p + "%";

      progressBarContainer.setAttribute(
        "aria-valuenow",
        p
      );
    }

    async function getUploadedChunks(
      fileGuid
    ) {

      try {

        const resp = await fetch(
          `${API_BASE}/capitulos/status/${fileGuid}`
        );

        const data =
          await resp.json();

        return data.uploadedChunks || [];

      } catch {

        return [];
      }
    }

    async function uploadFile(
      file,
      titulo,
      descripcion
    ) {

      currentFileName.textContent =
        `Subiendo: ${file.name}`;

      const totalChunks =
        Math.ceil(
          file.size / CHUNK_SIZE
        );

      const fileGuid =
        file.name.replace(/\W/g, '');

      const existingChunks =
        await getUploadedChunks(
          fileGuid
        );

      for (
        let i = 0;
        i < totalChunks;
        i++
      ) {

        if (
          existingChunks.includes(i)
        ) {
          continue;
        }

        const chunk =
          file.slice(
            i * CHUNK_SIZE,
            (i + 1) * CHUNK_SIZE
          );

        const fd =
          new FormData();

        fd.append(
          "file",
          chunk
        );

        fd.append(
          "chunkIndex",
          i
        );

        fd.append(
          "totalChunks",
          totalChunks
        );

        fd.append(
          "fileGuid",
          fileGuid
        );

        fd.append(
          "originalName",
          file.name
        );

        fd.append(
          "titulo",
          titulo
        );

        fd.append(
          "descripcion",
          descripcion
        );

        try {

          const resp =
            await fetch(
              `${API_BASE}/capitulos/upload`,
              {
                method: "POST",
                body: fd
              }
            );

          const data =
            await resp.json();

          if (!resp.ok) {

            throw new Error(
              data.error ||
              "Error servidor"
            );
          }

          const received =
            data.received ||
            (i + 1);

          const percentage =
            Math.round(
              (
                received /
                totalChunks
              ) * 100
            );

          updateProgress(
            percentage
          );

        } catch (err) {

          console.error(err);

          alert(
            "Error subiendo " +
            file.name
          );

          throw err;
        }
      }

      updateProgress(100);

      uploadedFiles.innerHTML += `
    <div class="alert alert-success py-1 my-1">
      Archivo subido:
      ${file.name}
    </div>
  `;

      currentFileName.textContent =
        "";
    }

    document
      .getElementById(
        "formCapitulos"
      )
      .addEventListener(
        "submit",
        async function (e) {

          e.preventDefault();

          const files =
            document
              .getElementById(
                "chapterFiles"
              )
              .files;

          if (!files.length) {

            return alert(
              "Selecciona archivos"
            );
          }

          const titulo =
            this.titulo.value;

          const descripcion =
            this.descripcion.value;

          let uploadedCount = 0;

          for (
            let i = 0;
            i < files.length;
            i++
          ) {

            try {

              await uploadFile(
                files[i],
                titulo,
                descripcion
              );

              uploadedCount++;

              const totalPercentage =
                Math.round(
                  (
                    uploadedCount /
                    files.length
                  ) * 100
                );

              updateProgress(
                totalPercentage
              );

            } catch {

              break;
            }
          }

          if (
            uploadedCount ===
            files.length
          ) {

            alert(
              "Todos los archivos subidos correctamente"
            );
          }
        }
      );

  </script>

</body>
