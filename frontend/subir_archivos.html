<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>Subir Archivos - Ejidosoft Formación</title>

  <link rel="icon" type="image/webp" href="img/logo.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/subir_archivos.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg" role="navigation">
    <div class="container">

      <a class="navbar-brand d-flex align-items-center text-white" href="index.html"></a>

      <div class="ms-auto">
        <a href="admin.html" class="btn btn-warning">
          <i class="fa-solid fa-arrow-left"></i>
          Volver
        </a>
      </div>

    </div>
  </nav>

  <!-- HEADER -->
  <header class="encabezado-login" role="banner">
    <div class="container">

      <div class="row align-items-center text-center text-md-start">

        <div class="col-md-4 mb-4 mb-md-0 d-flex justify-content-center justify-content-md-start">
          <img src="img/logo.png" class="img-fluid logo-login" />
        </div>

        <div class="col-md-8 d-flex align-items-center justify-content-md-start justify-content-center">
          <h1 class="fw-bold titulo-formulario">
            <i class="fa-solid fa-upload me-2"></i>
            Subir Archivos
          </h1>
        </div>

      </div>

    </div>
  </header>

  <!-- MAIN -->
  <main class="main-upload" role="main">

    <!-- 🔥 SOLO HE AJUSTADO AQUÍ EL ESPACIADO -->
    <section class="login-section py-5">

      <div class="container">

        <div class="row justify-content-center">

          <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <!-- 🔥 AQUÍ ESTA EL FIX: margen inferior para no tocar footer -->
            <div class="modal-content border-0 ui-panel shadow-lg mb-5" style="border-radius: 12px;">

              <div class="text-end p-3">
                <a href="admin.html" class="btn-close"></a>
              </div>

              <div class="p-4">
                <form id="formSubir">

                  <div class="mb-3">
                    <label class="form-label">Selecciona archivos</label>
                    <input type="file" class="form-control" id="archivos" multiple required />
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Título general</label>
                    <input type="text" class="form-control" id="titulo" required />
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input type="text" class="form-control" id="descripcion" required />
                  </div>

                  <input type="hidden" id="publico" value="true" />

                  <button type="submit" class="btn btn-principal w-100">
                    <i class="fa-solid fa-upload me-1"></i>
                    Subir archivos
                  </button>

                </form>

                <div class="mt-3" id="progresoContainer"></div>
                <div class="mt-3" id="respuesta"></div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </section>

  </main>

  <!-- FOOTER (NO TOCADO, COMPLETO COMO LO TIENES) -->
  <footer class="text-center py-3 text-white" role="contentinfo">
    <div class="container">

      <div class="row">

        <div class="col-6 col-md-2"></div>
        <div class="col-6 col-md-2"></div>

        <div class="col-6 col-md-2">
          © 2026 Ejidosoft Formación
        </div>

        <div class="col-6 col-md-2"></div>

        <div class="col-6 col-md-2">
          <img src="img/logo-pie.png" alt="Logo inferior Ejidosoft Formación" />
        </div>

        <div class="col-md-2 footer-contacto ms-auto text-md-end">
          C/Jaén nº18-20 04700<br>
          El Ejido (Almería)<br>
          Telf.: 950 48 73 99<br>
          info@ejidosoft.es
        </div>

      </div>

    </div>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>

  <script>
    const form = document.getElementById("formSubir");
    const archivosInput = document.getElementById("archivos");
    const respuesta = document.getElementById("respuesta");
    const progresoContainer = document.getElementById("progresoContainer");

    const API_URL = "http://localhost:3000/api/archivos/subir-multiples";
    const token = localStorage.getItem("token");
    if (!token) location.href = "login.html";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      respuesta.innerHTML = "";
      progresoContainer.innerHTML = "";

      const files = Array.from(archivosInput.files);

      if (!files.length) return;

      const titulo = document.getElementById("titulo").value.trim();
      const descripcion = document.getElementById("descripcion").value.trim();

      files.forEach(file => {
        const div = document.createElement("div");
        div.textContent = file.name;
        progresoContainer.appendChild(div);
      });

      respuesta.innerHTML = "<div class='alert alert-info'>Subiendo...</div>";
    });
  </script>

</body>

</html>
