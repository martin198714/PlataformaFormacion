<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Firma contrato</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

    <h2>Firma de contrato</h2>

    <div id="info">Cargando...</div>

    <iframe id="pdf" width="100%" height="500"></iframe>

    <hr>

    <h4>Subir contrato firmado</h4>

    <input type="file" id="file" accept="application/pdf">
    <br><br>

    <button id="btn" class="btn btn-success">
        Firmar contrato
    </button>

    <script>

        const BASE_URL = "http://localhost:3000";
        const token = new URLSearchParams(location.search).get("token");

        const info = document.getElementById("info");
        const pdf = document.getElementById("pdf");
        const file = document.getElementById("file");

        let contratoId = null;

        /* =========================
           CARGAR CONTRATO
        ========================= */
        async function cargar() {

            const res = await fetch(`${BASE_URL}/api/contratos/firma/${token}`);
            const data = await res.json();

            if (!res.ok) {
                info.innerText = data.error;
                return;
            }

            contratoId = data.ID;

            info.innerHTML =
                `Contrato #${data.ID} - ${data.ESTADO}`;

            pdf.src =
                `${BASE_URL}/api/archivos/${data.ARCHIVO_ENVIADO_ID}`;
        }

        cargar();

        /* =========================
           SUBIR FIRMA
        ========================= */
        document.getElementById("btn").onclick = async () => {

            if (!file.files[0]) {
                alert("Sube un PDF firmado");
                return;
            }

            const form = new FormData();
            form.append("pdf", file.files[0]);

            const res = await fetch(
                `${BASE_URL}/api/contratos/firmar/${contratoId}`,
                {
                    method: "POST",
                    body: form,
                    headers: {
                        Authorization: localStorage.getItem("token")
                    }
                }
            );

            const data = await res.json();

            if (!res.ok) {
                alert(data.error);
                return;
            }

            alert("Contrato firmado ✔");
            location.reload();
        };

    </script>

</body>

</html>
