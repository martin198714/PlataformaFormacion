<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Firma de contrato</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 15px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1a5fd1;
        }

        .info {
            margin-top: 10px;
            color: #333;
        }

        input[type="file"] {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <header>
        <!-- TU HEADER -->
    </header>

    <div class="container">

        <h2>📄 Firma de contrato</h2>

        <div id="estado" class="info">Cargando contrato...</div>

        <!-- =========================
         VISOR PDF
    ========================= -->
        <iframe id="pdfViewer" style="width:100%; height:500px; border:1px solid #ccc; border-radius:8px;"></iframe>

        <!-- fallback -->
        <p id="pdfError" style="color:red; display:none;">
            ⚠ No se pudo cargar el PDF del contrato
        </p>

        <!-- =========================
         SUBIR FIRMA
    ========================= -->
        <h3>Subir contrato firmado</h3>

        <input type="file" id="file" accept="application/pdf" />

        <br><br>

        <button class="btn" onclick="subirFirma()">
            ✔ Firmar contrato
        </button>

        <!-- resultado -->
        <div id="resultado" class="info"></div>

    </div>

    <footer>
        <!-- TU FOOTER -->
    </footer>

    <script>
        const BASE_URL = "http://localhost:3000";

        let token = null;
        let contrato = null;

        /* =========================
           OBTENER TOKEN URL
        ========================= */
        function getToken() {
            return new URLSearchParams(window.location.search).get("token");
        }

        /* =========================
           CARGAR CONTRATO POR TOKEN
        ========================= */
        async function cargarContrato() {
            try {
                token = getToken();

                if (!token) {
                    document.getElementById("estado").innerText = "❌ Token no válido";
                    return;
                }

                const res = await fetch(
                    `${BASE_URL}/api/contratos/firma/${token}`
                );

                const data = await res.json();

                if (!res.ok) {
                    document.getElementById("estado").innerText =
                        data.error || "❌ Contrato no encontrado";
                    return;
                }

                contrato = data;

                document.getElementById("estado").innerText =
                    "✔ Contrato listo para firma";

                /* =========================
                   MOSTRAR PDF
                ========================= */
                const pdfViewer = document.getElementById("pdfViewer");

                const fileName =
                    data.FICHERO_NOMBRE ||
                    data.fileName ||
                    data.ARCHIVO_NOMBRE;

                if (fileName) {
                    pdfViewer.src = `${BASE_URL}/uploads/contratos/${fileName}`;
                } else {
                    document.getElementById("estado").innerText =
                        "⚠ Este contrato no tiene PDF asociado";
                }

            } catch (err) {
                console.error(err);
                document.getElementById("estado").innerText =
                    "❌ Error cargando contrato";
            }
        }

        /* =========================
           FIRMAR CONTRATO
        ========================= */
        async function subirFirma() {

            try {

                const file =
                    document.getElementById("file").files[0];

                if (!file) {
                    alert("Selecciona un PDF firmado");
                    return;
                }

                if (!token) {
                    alert("Token inválido");
                    return;
                }

                const formData = new FormData();

                formData.append("pdf", file);

                const res = await fetch(
                    `${BASE_URL}/api/uploads/contratos/firmar/token/${token}`,
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(
                        data.error || "Error al firmar"
                    );
                }

                document.getElementById("resultado").innerText =
                    "✔ PDF firmado subido correctamente";

                document.getElementById("estado").innerText =
                    "✔ Contrato firmado";

                console.log(data);

            } catch (err) {

                console.error(err);

                document.getElementById("resultado").innerText =
                    err.message;
            }
        }

        /* =========================
           INICIALIZAR
        ========================= */
        cargarContrato();
    </script>

</body>

</html>
