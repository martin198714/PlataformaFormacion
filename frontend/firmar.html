<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Firma de contrato</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 15px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1a5fd1;
        }

        .info {
            margin-top: 10px;
            color: #333;
        }

        input[type="file"] {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <header>
        <!-- TU HEADER -->
    </header>

    <div class="container">

        <h2>Firma de contrato</h2>

        <div id="estado" class="info">Cargando contrato...</div>

        <iframe id="pdfViewer"></iframe>

        <h3>Subir contrato firmado</h3>

        <input type="file" id="file" accept="application/pdf" />
        <br>

        <button class="btn" onclick="subirFirma()">Firmar contrato</button>

        <div id="resultado" class="info"></div>

    </div>

    <footer>
        <!-- TU FOOTER -->
    </footer>

    <script>
        const BASE_URL = "http://localhost:3000";

        let contratoId = null;
        let token = null;

        function getToken() {
            return new URLSearchParams(window.location.search).get("token");
        }

        /* =========================
           CARGAR CONTRATO POR TOKEN
        ========================= */
        async function cargarContrato() {
            try {
                token = getToken();

                if (!token) {
                    document.getElementById("estado").innerText = "Token no válido";
                    return;
                }

                const res = await fetch(`${BASE_URL}/api/contratos/firma/${token}`);
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById("estado").innerText =
                        data.error || "Error cargando contrato";
                    return;
                }

                contratoId = data.ID || data.id;

                document.getElementById("estado").innerText =
                    "Contrato listo para firma";

                /* =========================
                   PDF (FIX REAL)
                ========================= */
                const pdfViewer = document.getElementById("pdfViewer");

                // 🔥 AQUÍ ESTÁ EL FIX IMPORTANTE
                const fileName =
                    data.FICHERO_NOMBRE ||
                    data.fileName ||
                    data.ARCHIVO_NOMBRE ||
                    null;

                if (fileName && fileName !== "") {
                    pdfViewer.src = `${BASE_URL}/uploads/contratos/${fileName}`;
                } else {
                    document.getElementById("estado").innerText =
                        "Este contrato no tiene PDF asociado";
                }

            } catch (err) {
                console.error(err);
                document.getElementById("estado").innerText =
                    "Error cargando contrato";
            }
        }

        /* =========================
           SUBIR FIRMA (PDF FIRMADO)
        ========================= */
        async function subirFirma() {
            try {
                const file = document.getElementById("file").files[0];

                if (!file) return alert("Selecciona un PDF");
                if (!contratoId) return alert("Contrato no cargado");

                const formData = new FormData();
                formData.append("pdf", file);

                const res = await fetch(
                    `${BASE_URL}/api/contratos/firmar/${contratoId}`,
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await res.json();

                if (!res.ok) {
                    document.getElementById("resultado").innerText =
                        data.error || "Error al firmar";
                    return;
                }

                document.getElementById("resultado").innerText =
                    "Contrato firmado ✔";

            } catch (err) {
                console.error(err);
            }
        }

        cargarContrato();
    </script>

</body>

</html>
