<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Firma de contrato</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 15px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1a5fd1;
        }

        .info {
            margin-top: 10px;
            color: #333;
        }

        input[type="file"] {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- 🔥 TU NAV / HEADER (NO TOCADO) -->
    <header>
        <!-- deja tu header aquí -->
    </header>

    <div class="container">

        <h2>Firma de contrato</h2>

        <div id="estado" class="info">Cargando contrato...</div>

        <!-- VISUALIZADOR PDF -->
        <iframe id="pdfViewer"></iframe>

        <!-- SUBIDA FIRMA -->
        <h3>Subir contrato firmado</h3>

        <input type="file" id="file" accept="application/pdf" />
        <br>

        <button class="btn" onclick="subirFirma()">Firmar contrato</button>

        <div id="resultado" class="info"></div>

    </div>

    <!-- 🔥 TU FOOTER (NO TOCADO) -->
    <footer>
        <!-- deja tu footer aquí -->
    </footer>

    <script>
        let contratoId = null;
        let token = null;

        /* =========================
           1. TOKEN URL
        ========================= */
        function getToken() {
            return new URLSearchParams(window.location.search).get("token");
        }

        /* =========================
           2. CARGAR CONTRATO
        ========================= */
        async function cargarContrato() {
            try {
                token = getToken();

                if (!token) {
                    document.getElementById("estado").innerText = "Token no válido";
                    return;
                }

                const res = await fetch(`/api/contratos/firma/${token}`);
                const data = await res.json();

                if (!res.ok) {
                    document.getElementById("estado").innerText = data.error || "Error";
                    return;
                }

                contratoId = data.ID || data.id;

                document.getElementById("estado").innerText =
                    "Contrato listo para firma";

                /* 👀 PDF PREVIEW (AJUSTA SI TU PATH ES DISTINTO) */
                document.getElementById("pdfViewer").src =
                    `/uploads/${data.ARCHIVO_ENVIADO_ID}`;

            } catch (err) {
                console.error(err);
                document.getElementById("estado").innerText = "Error cargando contrato";
            }
        }

        /* =========================
           3. SUBIR PDF FIRMADO
        ========================= */
        async function subirFirma() {
            try {
                const file = document.getElementById("file").files[0];

                if (!file) {
                    alert("Selecciona un PDF");
                    return;
                }

                if (!contratoId) {
                    alert("Contrato no cargado");
                    return;
                }

                const formData = new FormData();
                formData.append("pdf", file);

                const res = await fetch(`/api/contratos/firmar/${contratoId}`, {
                    method: "POST",
                    body: formData,
                    credentials: "include"
                });

                const data = await res.json();

                if (!res.ok) {
                    document.getElementById("resultado").innerText =
                        data.error || "Error al firmar";
                    return;
                }

                document.getElementById("resultado").innerText =
                    "Contrato firmado correctamente ✔";

            } catch (err) {
                console.error(err);
                document.getElementById("resultado").innerText =
                    "Error al subir firma";
            }
        }

        /* INIT */
        cargarContrato();
    </script>

</body>

</html>
