<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <!-- SEO -->
    <meta name="description"
        content="Calendario de formación para gestión de cursos, inscripción y administración de eventos formativos.">
    <meta name="keywords" content="formación, cursos, calendario, educación, gestión de cursos">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="http://localhost/calendario-formacion">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BUENAS PRÁCTICAS -->
    <meta name="theme-color" content="#0d6efd">
    <meta name="author" content="Ejidosoft Formación">

    <title>Calendario de Formación</title>
    <link rel="icon" type="image/webp" href="img/logo.png" />

    <!-- FULLCALENDAR -->

    <!-- EXCEL -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <!-- FULLCALENDAR IDIOMA -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales-all.global.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/calendario.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-expand-lg" role="navigation" aria-label="Barra de navegación principal">
        <div class="container-fluid">

            <a class="navbar-brand" href="#" aria-label="Inicio formación">
                📚 Formación
            </a>

            <button class="btn btn-amarillo" data-bs-toggle="modal" data-bs-target="#cursoModal"
                aria-label="Crear nuevo curso" type="button">
                Nuevo curso
            </button>
            <div class="ms-auto">
                <a href="admin.html" class="btn btn-warning">
                    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                    Volver
                </a>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <main class="container mt-4" role="main" aria-label="Contenido principal del calendario de formación">

        <header class="encabezado-login" role="banner">
            <div class="container">
                <div class="row align-items-center">

                    <!-- LOGO -->
                    <div class="col-12 col-md-3 text-center text-md-start mb-3 mb-md-0">
                        <img src="img/logo.png" alt="Logo Ejidosoft Formación" class="img-fluid logo-login"
                            loading="lazy">
                    </div>

                    <!-- TÍTULO -->
                    <div class="col-12 col-md-6 text-center">
                        <h1 class="fw-bold titulo-formulario m-0">
                            Calendario de formaciones
                        </h1>
                    </div>

                    <div class="col-12 col-md-3 text-center text-md-end"></div>

                </div>
            </div>
        </header>

        <br>

        <div class="row">

            <div class="col-lg-9" aria-label="Calendario de cursos">
                <div id="calendar" role="application" aria-label="Calendario interactivo de cursos"></div>
            </div>

            <div class="col-lg-3" aria-label="Lista de cursos activos">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        Cursos activos
                    </div>
                    <div class="card-body" id="listaCursos" aria-live="polite">
                        Cargando...
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- MODAL CREAR -->
    <div class="modal fade" id="cursoModal" aria-hidden="true" aria-labelledby="tituloCrearCurso" role="dialog">

        <div class="modal-dialog">
            <div class="modal-content p-3">

                <h2 id="tituloCrearCurso" class="h5">Crear curso</h2>

                <input id="titulo" class="form-control mb-2" placeholder="Título" aria-label="Título del curso">

                <textarea id="desc" class="form-control mb-2" placeholder="Descripción"
                    aria-label="Descripción del curso"></textarea>

                <input type="date" id="inicio" class="form-control mb-2" aria-label="Fecha de inicio">

                <input type="date" id="fin" class="form-control mb-2" aria-label="Fecha de fin">

                <input type="number" id="duracion" class="form-control mb-2" placeholder="Duración"
                    aria-label="Duración del curso">

                <input type="number" id="plazas" class="form-control mb-2" placeholder="Plazas"
                    aria-label="Plazas disponibles">

                <button class="btn btn-amarillo w-100" onclick="crearCurso()" aria-label="Guardar curso">
                    Guardar
                </button>

            </div>
        </div>
    </div>

    <!-- MODAL EDITAR -->
    <div class="modal fade" id="cursoModalEdit" aria-hidden="true" aria-labelledby="tituloEditarCurso" role="dialog">

        <div class="modal-dialog">
            <div class="modal-content p-3">

                <h2 id="tituloEditarCurso" class="h5">✏️ Editar curso</h2>

                <input type="hidden" id="e_id">

                <input id="e_titulo" class="form-control mb-2" aria-label="Editar título">

                <textarea id="e_desc" class="form-control mb-2" aria-label="Editar descripción"></textarea>

                <input id="e_inicio" type="date" class="form-control mb-2" aria-label="Editar fecha inicio">

                <input id="e_fin" type="date" class="form-control mb-2" aria-label="Editar fecha fin">

                <input id="e_duracion" type="number" class="form-control mb-2" aria-label="Editar duración">

                <input id="e_plazas" type="number" class="form-control mb-2" aria-label="Editar plazas">

                <select id="e_estado" class="form-control mb-2" aria-label="Estado del curso">

                    <option value="1">Publicado</option>
                    <option value="2">Completo</option>
                    <option value="3">Cancelado</option>
                    <option value="4">En curso</option>
                    <option value="5">Finalizado</option>
                    <option value="6">Eliminado</option>

                </select>

                <div class="d-flex gap-2">
                    <button class="btn btn-amarillo w-50" onclick="guardarEdicion()" aria-label="Guardar cambios">
                        Guardar
                    </button>

                    <button class="btn btn-amarillo w-50" onclick="eliminarCurso()" aria-label="Eliminar curso">
                        Borrar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- 🔥 AÑADE ESTE MODAL JUSTO DEBAJO DE cursoModalEdit -->

    <div class="modal fade" id="alumnosModal" tabindex="-1" aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered modal-xl" style="max-width:95vw;">

            <div class="modal-content p-4" style="height:90vh;">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4 class="text-primary fw-bold m-0">
                        👥 Alumnos inscritos
                    </h4>

                    <div class="d-flex gap-2 align-items-center">

                        <button class="btn btn-sm" onclick="exportarExcel()"
                            style="background-color:#FFCA2C; border-color:#FFCA2C; color:white;">
                            📊 Excel
                        </button>

                        <button class="btn btn-sm" onclick="exportarPDF()"
                            style="background-color:#FFCA2C; border-color:#FFCA2C; color:white;">
                            📄 PDF
                        </button>

                        <!-- 🔥 BOTÓN CERRAR -->
                        <button type="button" class="btn-close ms-2" data-bs-dismiss="modal" aria-label="Cerrar">
                        </button>

                    </div>
                </div>

                <!-- TABLA -->
                <div class="table-responsive flex-grow-1" style="overflow:auto; max-height:75vh;">

                    <table class="table table-hover align-middle w-100">

                        <thead class="table-light">
                            <tr style="color:#0d6efd; font-weight:bold;">
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Teléfono</th>
                                <th>Curso inscrito</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>

                        <tbody id="listaAlumnos">
                            <tr>
                                <td colspan="5" class="text-center">
                                    Cargando...
                                </td>
                            </tr>
                        </tbody>

                    </table>

                </div>

            </div>

        </div>
    </div>
    <!-- FOOTER -->
    <footer class="text-center py-3 text-white" role="contentinfo" aria-label="Pie de página">

        <div class="container">
            <div class="row">

                <div class="col-6 col-md-2"></div>
                <div class="col-6 col-md-2"></div>

                <div class="col-6 col-md-2">
                    © 2026 Ejidosoft Formación
                </div>

                <div class="col-6 col-md-2"></div>

                <div class="col-6 col-md-2">
                    <img src="img/logo-pie.png" alt="Logo pie Ejidosoft" loading="lazy">
                </div>

                <div class="col-md-2 footer-contacto ms-auto text-md-end">
                    C/Jaén nº18-20 04700<br>
                    El Ejido (Almería)<br>
                    Telf.: 950 48 73 99<br>
                    info@ejidosoft.es
                </div>

            </div>
        </div>
    </footer>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const API = "http://localhost:3000/api";
        let calendar;

        // =========================
        // INIT
        // =========================
        document.addEventListener("DOMContentLoaded", () => {

            const el = document.getElementById("calendar");
            if (!el) return;

            calendar = new FullCalendar.Calendar(el, {

                initialView: "dayGridMonth",
                height: 650,
                locale: "es",

                // =========================
                // CALENDARIO
                // =========================
                events: (info, success) => {

                    fetch(`${API}/cursos/estado`)
                        .then(r => r.json())
                        .then(data => {

                            const eventos = (data || [])
                                .filter(c => c.CURSO_ID)
                                .map(c => {

                                    const start = formatDate(c.FECHA_INICIO);
                                    const endRaw = c.FECHA_FIN
                                        ? formatDate(c.FECHA_FIN)
                                        : start;

                                    const end = addOneDay(endRaw);

                                    return {
                                        id: String(c.CURSO_ID),
                                        title: `${c.CURSO_ID} - ${c.TITULO}`,
                                        start,
                                        end,
                                        allDay: true,

                                        extendedProps: {
                                            descripcion: c.DESCRIPCION || "",
                                            duracion: c.DURACION || 0,
                                            plazas: c.PLAZAS || 0,
                                            ocupadas: c.OCUPADAS || 0,
                                            estado_id: c.ESTADO_ID || 1
                                        }
                                    };
                                });

                            success(eventos);
                        })
                        .catch(err => {
                            console.error("ERROR CALENDARIO:", err);
                            success([]);
                        });
                },

                // =========================
                // COLORES
                // =========================
                eventDidMount: (info) => {

                    const estado = info.event.extendedProps.estado_id;

                    let color = "#0d6efd";

                    if (estado == 2) color = "#dc3545";
                    if (estado == 3) color = "#fd7e14";
                    if (estado == 4) color = "#198754";
                    if (estado == 5) color = "#6c757d";

                    info.el.style.backgroundColor = color;
                    info.el.style.border = "none";
                },

                // =========================
                // CLICK EDITAR
                // =========================
                eventClick: (info) => {

                    const e = info.event;

                    document.getElementById("e_id").value = e.id;

                    document.getElementById("e_titulo").value =
                        e.title.replace(`${e.id} - `, "");

                    document.getElementById("e_desc").value = e.extendedProps.descripcion;
                    document.getElementById("e_inicio").value = e.startStr;

                    document.getElementById("e_fin").value =
                        e.endStr ? quitarUnDia(e.endStr) : e.startStr;

                    document.getElementById("e_duracion").value = e.extendedProps.duracion;
                    document.getElementById("e_plazas").value = e.extendedProps.plazas;
                    document.getElementById("e_estado").value = e.extendedProps.estado_id;

                    new bootstrap.Modal(
                        document.getElementById("cursoModalEdit")
                    ).show();
                }
            });

            calendar.render();
            cargarCursosActivos();
        });


        // =========================
        // FECHA SEGURA
        // =========================
        function formatDate(date) {

            if (!date) return null;

            const d = new Date(date);

            if (isNaN(d)) return null;

            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');

            return `${year}-${month}-${day}`;
        }

        // =========================
        // SUMAR / RESTAR DÍAS
        // =========================
        function addOneDay(dateStr) {
            const d = new Date(dateStr);
            d.setDate(d.getDate() + 1);
            return formatDate(d);
        }

        function quitarUnDia(dateStr) {
            const d = new Date(dateStr);
            d.setDate(d.getDate() - 1);
            return formatDate(d);
        }


        // =========================
        // LISTA DERECHA
        // =========================
        function cargarCursosActivos() {

            fetch(`${API}/cursos/estado`)
                .then(r => r.json())
                .then(data => {

                    const cont = document.getElementById("listaCursos");

                    if (!Array.isArray(data) || data.length === 0) {
                        cont.innerHTML = "<p>No hay cursos</p>";
                        return;
                    }

                    cont.innerHTML = data.map(c => `

                <div class="mb-2 p-2 border rounded">

                    <strong>${c.CURSO_ID} - ${c.TITULO}</strong><br>

                    📅 ${formatDate(c.FECHA_INICIO)}<br>

                    👥 
                    <span style="cursor:pointer;text-decoration:underline"
                          onclick="verAlumnos(${c.CURSO_ID})">
                        ${c.OCUPADAS} / ${c.PLAZAS}
                    </span>

                    <div class="mt-2 d-flex gap-1">

                        <button class="btn btn-sm w-50"
                            style="background:#FFCA2C;border:none;color:white"
                            onclick="abrirEditarDesdeLista(${c.CURSO_ID})">
                            Editar
                        </button>

                        <button class="btn btn-sm w-50"
                            style="background:#FFCA2C;border:none;color:white"
                            onclick="eliminarCurso(${c.CURSO_ID})">
                            Borrar
                        </button>

                    </div>

                </div>

            `).join("");
                });
        }


        function verAlumnos(idCurso) {

            fetch(`${API}/cursos/${idCurso}/alumnos`)
                .then(r => r.json())
                .then(data => {

                    console.log("ALUMNOS:", data);

                    const cont = document.getElementById("listaAlumnos");

                    if (!Array.isArray(data) || data.length === 0) {
                        cont.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center text-muted">
                            No hay alumnos inscritos
                        </td>
                    </tr>
                `;
                    } else {

                        cont.innerHTML = data.map(a => `
                    <tr>
                        <td>${a.NOMBRE}</td>
                        <td>${a.EMAIL || '-'}</td>
                        <td>${a.TELEFONO || '-'}</td>

                        <td>
                            <span>
                                 ${a.TITULO || 'Sin curso'}
                            </span>
                        </td>

                        <td>
                            <button class="btn btn-sm btn-outline-primary"
                                onclick="verPerfil(${a.ALUMNO_ID})">
                                Ver perfil
                            </button>
                        </td>
                    </tr>
                `).join("");
                    }

                    // 🔥 ESTO ES LO QUE TE FALTABA
                    new bootstrap.Modal(
                        document.getElementById("alumnosModal")
                    ).show();

                })
                .catch(err => {
                    console.error("ERROR ALUMNOS:", err);
                    alert("Error cargando alumnos");
                });
        }

        function verPerfil(id) {
            alert("Perfil del alumno ID: " + id);
        }

        function exportarExcel() {

            const tabla = document.getElementById("listaAlumnos");

            const datos = [];

            tabla.querySelectorAll("tr").forEach((row, i) => {

                const celdas = row.querySelectorAll("td");

                if (celdas.length > 0) {
                    datos.push([
                        celdas[0].innerText,
                        celdas[1].innerText,
                        celdas[2].innerText,
                        celdas[3].innerText
                    ]);
                }
            });

            const ws = XLSX.utils.aoa_to_sheet([
                ["Nombre", "Email", "Teléfono", "Curso"],
                ...datos
            ]);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Alumnos");

            XLSX.writeFile(wb, "alumnos_inscritos.xlsx");
        }

        function exportarPDF() {

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const tabla = document.getElementById("listaAlumnos");

            const datos = [];

            tabla.querySelectorAll("tr").forEach(row => {

                const celdas = row.querySelectorAll("td");

                if (celdas.length > 0) {
                    datos.push([
                        celdas[0].innerText,
                        celdas[1].innerText,
                        celdas[2].innerText,
                        celdas[3].innerText
                    ]);
                }
            });

            doc.text("Alumnos inscritos", 14, 15);

            doc.autoTable({
                startY: 25,
                head: [["Nombre", "Email", "Teléfono", "Curso"]],
                body: datos
            });

            doc.save("alumnos_inscritos.pdf");
        }

        // =========================
        // EDITAR DESDE LISTA
        // =========================
        function abrirEditarDesdeLista(id) {

            fetch(`${API}/cursos`)
                .then(r => r.json())
                .then(data => {

                    const c = data.find(x => x.ID == id);
                    if (!c) return;

                    document.getElementById("e_id").value = c.ID;
                    document.getElementById("e_titulo").value = c.TITULO;
                    document.getElementById("e_desc").value = c.DESCRIPCION;
                    document.getElementById("e_inicio").value = formatDate(c.FECHA_INICIO);
                    document.getElementById("e_fin").value = formatDate(c.FECHA_FIN);
                    document.getElementById("e_duracion").value = c.DURACION;
                    document.getElementById("e_plazas").value = c.PLAZAS;
                    document.getElementById("e_estado").value = c.ESTADO_ID;

                    new bootstrap.Modal(
                        document.getElementById("cursoModalEdit")
                    ).show();
                });
        }


        // =========================
        // CREAR
        // =========================
        function crearCurso() {

            const fechaInicio = document.getElementById("inicio").value;

            if (!fechaInicio) {
                alert("La fecha de inicio es obligatoria");
                return;
            }

            const data = {
                titulo: document.getElementById("titulo").value,
                descripcion: document.getElementById("desc").value,
                fecha_inicio: fechaInicio,
                fecha_fin: document.getElementById("fin").value || fechaInicio,
                duracion: parseInt(document.getElementById("duracion").value) || 0,
                plazas: parseInt(document.getElementById("plazas").value) || 0,
                estado_id: 1
            };

            fetch(`${API}/cursos`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(() => {
                    calendar.refetchEvents();
                    cargarCursosActivos();
                });
        }


        // =========================
        // EDITAR
        // =========================
        function guardarEdicion() {

            const id = document.getElementById("e_id").value;

            const data = {
                titulo: document.getElementById("e_titulo").value,
                descripcion: document.getElementById("e_desc").value,
                fecha_inicio: document.getElementById("e_inicio").value,
                fecha_fin: document.getElementById("e_fin").value,
                duracion: parseInt(document.getElementById("e_duracion").value) || 0,
                plazas: parseInt(document.getElementById("e_plazas").value) || 0,
                estado_id: parseInt(document.getElementById("e_estado").value) || 1
            };

            console.log("EDITANDO:", id, data);

            fetch(`${API}/cursos/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(r => r.json())
                .then(resp => {

                    console.log("RESPUESTA:", resp);

                    calendar.refetchEvents();
                    cargarCursosActivos();

                    bootstrap.Modal.getInstance(
                        document.getElementById("cursoModalEdit")
                    ).hide();

                    alert("Curso actualizado");
                })
                .catch(err => {
                    console.error(err);
                    alert("Error actualizando");
                });
        }


        // =========================
        // BORRAR
        // =========================
        function eliminarCurso(id) {

            if (!confirm("¿Eliminar curso?")) return;

            fetch(`${API}/cursos/${id}`, {
                method: "DELETE"
            }).then(() => {
                calendar.refetchEvents();
                cargarCursosActivos();
            });
        }

    </script>
</body>

</html>
