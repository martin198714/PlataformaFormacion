<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin Contratos</title>
    <link rel="icon" type="image/webp" href="img/logo.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/admin_contratos.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg" role="navigation" aria-label="Menú principal del sitio">
        <div class="container">

            <a class="navbar-brand" href="admin.html" aria-label="Ir al panel de administración de Ejidosoft Formación">
            </a>

            <div class="ms-auto">
                <a href="admin.html" class="btn btn-warning">
                    <i class="fa-solid fa-arrow-left"></i>
                    Volver
                </a>
            </div>

        </div>
    </nav>

    <header class="encabezado-login" role="banner">
        <div class="container">
            <div class="row align-items-center text-center text-md-start">

                <div class="col-md-4">
                    <img src="img/logo.png" width="180" height="60" class="img-fluid logo-login"
                        alt="Logo de Ejidosoft Formación" loading="lazy" />
                </div>

                <div class="col-md-8">
                    <h1 class="fw-bold titulo-formulario">
                        Contratos
                    </h1>
                </div>

            </div>
        </div>
    </header>

    <section class="container my-5">
        <button onclick="cargar()">🔄 Recargar contratos</button>
        <button onclick="asignarPerfil()">➕ Asignar perfil</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Empresa</th>
                    <th>Perfil</th>
                    <th>Estado</th>
                    <th>Fecha envío</th>
                    <th>Acción</th>
                    <th>Link</th>
                </tr>
            </thead>

            <tbody id="tabla"></tbody>
        </table>
    </section>

    <!-- FOOTER -->
    <footer class="text-center py-3 text-white" role="contentinfo">
        <div class="container">
            <div class="row">

                <div class="col-6 col-md-2"></div>
                <div class="col-6 col-md-2"></div>

                <div class="col-6 col-md-2">
                    © 2026 Ejidosoft Formación
                </div>

                <div class="col-6 col-md-2"></div>

                <div class="col-6 col-md-2">
                    <img src="img/logo-pie.png" alt="Logo pie Ejidosoft" />
                </div>

                <div class="col-md-2 footer-contacto ms-auto text-md-end">
                    C/Jaén nº18-20 04700<br>
                    El Ejido (Almería)<br>
                    Telf.: 950 48 73 99<br>
                    info@ejidosoft.es
                </div>

            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>

    <script>
        const BASE_URL = "http://localhost:3000";

        function getAuthHeaders() {
            const token = localStorage.getItem("token");

            return {
                "Content-Type": "application/json",
                "Authorization": token ? `Bearer ${token}` : ""
            };
        }

        /* =========================
           SAFE (ANTI NULL)
        ========================= */
        const safe = (v) => (v === null || v === undefined ? "" : v);

        /* =========================
           CARGAR
        ========================= */
        async function cargar() {
            const res = await fetch(`${BASE_URL}/api/contratos`, {
                headers: getAuthHeaders()
            });

            const data = await res.json();

            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "";

            const unicos = [...new Map(data.map(c => [c.ID, c])).values()];

            unicos.forEach(c => {

                const estado = (c.ESTADO || "").toUpperCase();

                tbody.innerHTML += `
        <tr>
            <td>${safe(c.ID)}</td>
            <td>${safe(c.EMPRESA_NOMBRE)}</td>
            <td>${safe(c.PERFIL_NOMBRE)}</td>
            <td>${safe(c.ESTADO)}</td>
            <td>${safe(c.FECHA_ENVIO)}</td>

            <td>
                ${c.ARCHIVO_ENVIADO_ID
                        ? `<a href="${BASE_URL}/api/archivos/${c.ARCHIVO_ENVIADO_ID}" target="_blank">📄 PDF</a>`
                        : "Sin PDF"}
            </td>

            <td>
                ${c.TOKEN
                        ? `<a href="${BASE_URL}/firma/${c.TOKEN}" target="_blank">✍️ Firmar</a>`
                        : ""}
            </td>
        </tr>`;
            });
        }

        cargar();
    </script>

</body>

</html>
